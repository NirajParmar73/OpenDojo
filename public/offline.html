<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <title>OpenDojos is offline</title>
    <style>
      body { align-items: center; background: #f8fafc; color: #0f172a; display: flex; font: 16px system-ui, sans-serif; justify-content: center; margin: 0; min-height: 100vh; padding: 24px; text-align: center; }
      main { max-width: 28rem; }
      h1 { margin-bottom: 0.5rem; }
      p { color: #475569; line-height: 1.5; }
      button { background: #0f766e; border: 0; border-radius: 0.5rem; color: #fff; cursor: pointer; font: inherit; margin-top: 1rem; padding: 0.7rem 1rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>OpenDojos needs a connection to load live dojo and student information. Reconnect, then try again.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
